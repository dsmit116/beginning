name: Sync from EC2 and GitHub to S3

on:
  push:
    branches: [main]

jobs:
  deploy: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ secrets.AWS_REGION }}

      # Option 1: Pull files from EC2 to the runner, then push to S3
      - name: SSH into EC2 and upload to S3
        run: |
          # 1. Setup the SSH key from GitHub Secrets
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          
          # 2. Create local temp directory on the runner
          mkdir -p /tmp/deploy
          
          # 3. Download files from EC2 (using StrictHostKeyChecking=no to bypass the prompt)
          scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no -r ec2-user@${{ secrets.EC2_HOST }}:/path/to/your/files/* /tmp/deploy/
          
          # 4. Sync those downloaded files to S3
          aws s3 sync /tmp/deploy s3://${{ secrets.S3_BUCKET_NAME }} --region ${{ secrets.AWS_REGION }}

      # Option 2: Sync repository files directly from GitHub to S3
      - name: Upload GitHub files to S3
        run: |
          aws s3 sync ./ s3://${{ secrets.S3_BUCKET_NAME }} --region ${{ secrets.AWS_REGION }}
